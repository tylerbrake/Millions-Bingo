<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hadeees' Millions Bingo – Live Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #FFD700;
    --green: #00FF41;
    --red: #FF2D2D;
    --dark: #0a0a0a;
    --panel: #111;
    --border: #222;
    --text: #e8e8e8;
    --muted: #666;
    --team1: #4fc3f7;
    --team2: #ff8a65;
    --team3: #81c784;
    --complete: #1a3a1a;
    --complete-border: #00cc44;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none;
    z-index: 1000;
  }

  header {
    background: linear-gradient(135deg, #111 0%, #1a1a1a 100%);
    border-bottom: 2px solid var(--gold);
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 30px rgba(255,215,0,0.15);
  }

  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 3px;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,215,0,0.4);
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 2px;
    color: var(--green);
    text-transform: uppercase;
  }

  .live-dot {
    width: 8px;
    height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
    box-shadow: 0 0 8px var(--green);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  .main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 30px 20px;
  }

  /* SCOREBOARD */
  .scoreboard {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 40px;
  }

  .team-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s;
  }

  .team-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }

  .team-card[data-team="0"]::before { background: var(--team1); }
  .team-card[data-team="1"]::before { background: var(--team2); }
  .team-card[data-team="2"]::before { background: var(--team3); }

  .team-card.leader {
    border-color: var(--gold);
    box-shadow: 0 0 20px rgba(255,215,0,0.2);
  }

  .team-logo {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    object-fit: cover;
    margin: 0 auto 12px;
    display: block;
    border: 2px solid var(--border);
    background: #222;
  }

  .team-logo-placeholder {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: #222;
    margin: 0 auto 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    color: var(--muted);
    border: 2px solid var(--border);
  }

  .team-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.3rem;
    letter-spacing: 2px;
    margin-bottom: 8px;
    color: var(--text);
  }

  .team-score {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 3rem;
    line-height: 1;
    margin-bottom: 4px;
    transition: all 0.4s;
  }

  .team-card[data-team="0"] .team-score { color: var(--team1); }
  .team-card[data-team="1"] .team-score { color: var(--team2); }
  .team-card[data-team="2"] .team-score { color: var(--team3); }

  .team-tiles-count {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .crown {
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 1.2rem;
    animation: float 2s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  /* BOARD */
  .board-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .board-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .board-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 2px;
    color: var(--gold);
  }

  .team-legend {
    display: flex;
    gap: 16px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.75rem;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .legend-dot {
    width: 10px;
    height: 10px;
    border-radius: 2px;
  }

  .board-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr) 80px;
    gap: 2px;
    padding: 16px 16px 2px 16px;
    background: var(--dark);
  }

  .row-bonus-cell {
    background: #111;
    border: 1px solid #222;
    border-radius: 6px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding: 6px 4px;
    text-align: center;
  }

  .row-bonus-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
  }

  .tile {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 12px 8px 8px;
    min-height: 130px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative;
    transition: all 0.3s;
    overflow: hidden;
  }

  .tile-img {
    width: 48px;
    height: 48px;
    object-fit: contain;
    margin-bottom: 6px;
    border-radius: 4px;
  }

  .tile-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    flex: 1;
  }

  .tile-points {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.05rem;
    color: var(--gold);
    margin-top: 4px;
  }

  .tile-completions {
    display: flex;
    gap: 4px;
    margin-top: 8px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
  }

  .completion-pip {
    padding: 3px 7px;
    border-radius: 4px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: #000;
    white-space: nowrap;
  }

  .tile.any-complete {
    border-color: #333;
    background: #161616;
  }

  /* Row/col bonus row */
  .bonus-row {
    display: grid;
    grid-template-columns: repeat(6, 1fr) 80px;
    gap: 2px;
    padding: 0 16px 16px 16px;
    background: var(--dark);
  }

  .bonus-cell {
    background: #111;
    border: 1px solid #222;
    border-radius: 6px;
    padding: 8px 4px;
    text-align: center;
    margin-bottom: 2px;
  }

  .bonus-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .bonus-pips {
    display: flex;
    gap: 2px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .bonus-pip {
    width: 7px;
    height: 7px;
    border-radius: 1px;
    opacity: 0.9;
  }

  .loading {
    text-align: center;
    padding: 80px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 3px;
    color: var(--muted);
  }

  .score-bump {
    animation: scoreBump 0.5s ease;
  }

  @keyframes scoreBump {
    0% { transform: scale(1); }
    50% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }

  @media (max-width: 768px) {
    header { padding: 16px 20px; }
    .header-title { font-size: 1.5rem; }
    .scoreboard { grid-template-columns: 1fr; gap: 12px; }
    .board-grid { grid-template-columns: repeat(3, 1fr); }
    .bonus-row { grid-template-columns: repeat(3, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="header-title">Hadeees' Millions Bingo</div>
  <div class="live-badge">
    <div class="live-dot"></div>
    Live
  </div>
</header>

<div class="main">
  <div id="loading" class="loading">Connecting to live data...</div>

  <div id="app" style="display:none">
    <div class="scoreboard" id="scoreboard"></div>

    <div class="board-section">
      <div class="board-header">
        <div class="board-title">The Board</div>
        <div class="team-legend" id="legend"></div>
      </div>
      <div class="board-grid" id="board-grid"></div>
      <div class="bonus-row" id="col-bonuses"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDjjKHVn0m3o4-FQuntIOmZG5XOCRCi2oo",
  authDomain: "millions-bingo.firebaseapp.com",
  databaseURL: "https://millions-bingo-default-rtdb.firebaseio.com",
  projectId: "millions-bingo",
  storageBucket: "millions-bingo.firebasestorage.app",
  messagingSenderId: "1089430413297",
  appId: "1:1089430413297:web:503f66b97df26248612e50"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const TEAM_COLORS = ['var(--team1)', 'var(--team2)', 'var(--team3)'];
const TEAM_COLOR_VARS = ['--team1', '--team2', '--team3'];

let prevScores = [null, null, null];

function calcScores(gameState) {
  const { tiles, teams, bonusPoints } = gameState;
  const bonus = bonusPoints || 75;
  const scores = teams.map(() => 0);
  const tileCounts = teams.map(() => 0);

  tiles.forEach(tile => {
    teams.forEach((_, ti) => {
      if (tile.completed && tile.completed[ti]) {
        scores[ti] += tile.points || 0;
        tileCounts[ti]++;
      }
    });
  });

  // Row bonuses
  const cols = 6;
  const rows = Math.ceil(tiles.length / cols);
  teams.forEach((_, ti) => {
    for (let r = 0; r < rows; r++) {
      const rowTiles = tiles.slice(r * cols, r * cols + cols);
      if (rowTiles.length === cols && rowTiles.every(t => t.completed && t.completed[ti])) {
        scores[ti] += bonus;
      }
    }
    for (let c = 0; c < cols; c++) {
      const colTiles = [];
      for (let r = 0; r < rows; r++) {
        if (tiles[r * cols + c]) colTiles.push(tiles[r * cols + c]);
      }
      if (colTiles.length === rows && colTiles.every(t => t.completed && t.completed[ti])) {
        scores[ti] += bonus;
      }
    }
  });

  return { scores, tileCounts };
}

function renderScoreboard(gameState, scores, tileCounts) {
  const { teams } = gameState;
  const maxScore = Math.max(...scores);
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = '';

  teams.forEach((team, ti) => {
    const isLeader = scores[ti] === maxScore && maxScore > 0;
    const card = document.createElement('div');
    card.className = 'team-card' + (isLeader ? ' leader' : '');
    card.dataset.team = ti;

    const logoHTML = team.logo
      ? `<img src="${team.logo}" class="team-logo" alt="${team.name}">`
      : `<div class="team-logo-placeholder">${(team.name || 'T').charAt(0)}</div>`;

    card.innerHTML = `
      ${isLeader ? '<div class="crown">👑</div>' : ''}
      ${logoHTML}
      <div class="team-name">${team.name || `Team ${ti + 1}`}</div>
      <div class="team-score" id="score-${ti}">${scores[ti]}</div>
      <div class="team-tiles-count">${tileCounts[ti]} tiles completed</div>
    `;
    sb.appendChild(card);

    if (prevScores[ti] !== null && prevScores[ti] !== scores[ti]) {
      setTimeout(() => {
        const el = document.getElementById(`score-${ti}`);
        if (el) { el.classList.remove('score-bump'); void el.offsetWidth; el.classList.add('score-bump'); }
      }, 50);
    }
    prevScores[ti] = scores[ti];
  });
}

function renderLegend(teams) {
  const legend = document.getElementById('legend');
  legend.innerHTML = teams.map((t, ti) => `
    <div class="legend-item">
      <div class="legend-dot" style="background:${TEAM_COLORS[ti]}"></div>
      ${t.name || `Team ${ti + 1}`}
    </div>
  `).join('');
}

function renderBoard(gameState) {
  const { tiles, teams } = gameState;
  const cols = 6;
  const rows = Math.ceil(tiles.length / cols);
  const bonus = gameState.bonusPoints || 75;
  const grid = document.getElementById('board-grid');
  grid.innerHTML = '';

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const idx = r * cols + c;
      const tile = tiles[idx];
      if (!tile) { grid.appendChild(document.createElement('div')); continue; }

      const anyComplete = tile.completed && teams.some((_, ti) => tile.completed[ti]);
      const div = document.createElement('div');
      div.className = 'tile' + (anyComplete ? ' any-complete' : '');

      const imgHTML = tile.image
        ? `<img src="${tile.image}" class="tile-img" alt="${tile.name}" onerror="this.style.display='none'">`
        : '';

      const pips = teams.map((team, ti) => {
        if (!tile.completed || !tile.completed[ti]) return '';
        const label = (team.nickname || team.name || `T${ti+1}`).substring(0, 8);
        return `<div class="completion-pip" style="background:${TEAM_COLORS[ti]}">${label}</div>`;
      }).join('');

      div.innerHTML = `
        ${imgHTML}
        <div class="tile-name">${tile.name}</div>
        <div class="tile-points">${tile.points} pts</div>
        <div class="tile-completions">${pips}</div>
      `;
      grid.appendChild(div);
    }

    // Row bonus cell
    const rowTiles = tiles.slice(r * cols, r * cols + cols);
    const rowCell = document.createElement('div');
    rowCell.className = 'row-bonus-cell';
    const rowPips = teams.map((_, ti) => {
      const complete = rowTiles.length === cols && rowTiles.every(t => t.completed && t.completed[ti]);
      return complete ? `<div class="bonus-pip" style="background:${TEAM_COLORS[ti]}"></div>` : '';
    }).join('');
    rowCell.innerHTML = `<div class="row-bonus-label">Row +${bonus}</div><div class="bonus-pips">${rowPips}</div>`;
    grid.appendChild(rowCell);
  }

  // Column bonuses
  const colBonus = document.getElementById('col-bonuses');
  colBonus.innerHTML = '';
  for (let c = 0; c < cols; c++) {
    const colTiles = [];
    for (let r = 0; r < rows; r++) {
      if (tiles[r * cols + c]) colTiles.push(tiles[r * cols + c]);
    }
    const cell = document.createElement('div');
    cell.className = 'bonus-cell';
    const pips = teams.map((_, ti) => {
      const complete = colTiles.length === rows && colTiles.every(t => t.completed && t.completed[ti]);
      return complete ? `<div class="bonus-pip" style="background:${TEAM_COLORS[ti]}"></div>` : '';
    }).join('');
    cell.innerHTML = `<div class="bonus-label">Col +${bonus}</div><div class="bonus-pips">${pips}</div>`;
    colBonus.appendChild(cell);
  }
  colBonus.appendChild(document.createElement('div'));
}

onValue(ref(db, 'bingo'), (snapshot) => {
  const gameState = snapshot.val();
  if (!gameState || !gameState.tiles || !gameState.teams) return;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  const { scores, tileCounts } = calcScores(gameState);
  renderLegend(gameState.teams);
  renderScoreboard(gameState, scores, tileCounts);
  renderBoard(gameState);
});
</script>
</body>
</html>
